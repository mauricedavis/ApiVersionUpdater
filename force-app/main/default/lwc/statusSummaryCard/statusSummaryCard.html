<template>
    <lightning-card title="Current Session" icon-name="utility:database">
        <div slot="actions">
            <template lwc:if={showClearButton}>
                <lightning-button 
                    variant="neutral"
                    label="New Session"
                    icon-name="utility:add"
                    onclick={handleClearSession}>
                </lightning-button>
            </template>
        </div>

        <div class="slds-p-horizontal_medium slds-p-bottom_small">
            <div class="workflow-cards">
                
                <!-- 1. Scan Card -->
                <div class="workflow-step">
                    <div class={scanCardClass} onclick={handleScanClick}>
                        <div class="card-header">
                            <div class="card-icon scan-icon">
                                <lightning-icon icon-name="utility:search" size="small"></lightning-icon>
                            </div>
                            <div class={scanStepBadgeClass}>1</div>
                        </div>
                        <div class="card-title">Scan</div>
                        
                        <!-- Target API Badge -->
                        <div class="target-api-badge">
                            <span class="target-badge">Target: API {targetVersion}</span>
                        </div>
                        
                        <template lwc:if={hasScan}>
                            <div class="card-name">{displayScanName}</div>
                            <div class="card-status">
                                <span class={scanStatusClass}>{displayScanStatus}</span>
                            </div>
                            <div class="card-stats">
                                <span class="stat">{componentsNeedingUpgrade} need upgrade</span>
                                <template lwc:if={alertsCount}>
                                    <span class="stat stat-alert">{alertsCount} alerts</span>
                                </template>
                            </div>
                        </template>
                        <template lwc:else>
                            <div class="card-empty">No active scan</div>
                        </template>
                        
                        <div class="card-action">
                            <template lwc:if={showStartScanButton}>
                                <lightning-button 
                                    variant="brand" 
                                    label="Start Scan"
                                    icon-name="utility:search"
                                    onclick={handleStartScan}
                                    class="action-button">
                                </lightning-button>
                            </template>
                            <template lwc:elseif={isScanRunning}>
                                <lightning-button 
                                    variant="destructive" 
                                    label="Cancel"
                                    onclick={handleCancelScan}
                                    class="action-button">
                                </lightning-button>
                            </template>
                            <template lwc:elseif={isScanComplete}>
                                <div class="scan-complete-hint">
                                    <lightning-icon icon-name="utility:forward" size="xx-small"></lightning-icon>
                                    <span>Review findings</span>
                                </div>
                            </template>
                        </div>
                    </div>
                    <div class={connector1Class}></div>
                </div>

                <!-- 2. Review Card -->
                <div class="workflow-step">
                    <div class={findingsCardClass} onclick={handleFindingsClick}>
                        <div class="card-header">
                            <div class="card-icon findings-icon">
                                <lightning-icon icon-name="utility:preview" size="small"></lightning-icon>
                            </div>
                            <div class={findingsStepBadgeClass}>2</div>
                        </div>
                        <div class="card-title">Review</div>
                        
                        <template lwc:if={isScanComplete}>
                            <div class="card-stats-large">
                                <div class="big-stat">
                                    <span class="big-number">{findingsCount}</span>
                                    <span class="big-label">findings</span>
                                </div>
                            </div>
                            <div class="card-stats">
                                <span class="stat">{componentsNeedingUpgrade} components</span>
                                <template lwc:if={alertsCount}>
                                    <span class="stat stat-alert">{alertsCount} alerts</span>
                                </template>
                            </div>
                        </template>
                        <template lwc:else>
                            <div class="card-empty">Complete a scan to review</div>
                        </template>
                        
                        <div class="card-action">
                            <template lwc:if={showReviewButtons}>
                                <div class="button-group">
                                    <lightning-button 
                                        variant="neutral" 
                                        label="View Findings"
                                        onclick={handleFindingsClick}
                                        class="action-button slds-m-right_x-small">
                                    </lightning-button>
                                    <template lwc:if={showCreatePlanButton}>
                                        <lightning-button 
                                            variant="brand" 
                                            label="Create Plan"
                                            icon-name="utility:edit"
                                            onclick={handleCreatePlan}
                                            class="action-button">
                                        </lightning-button>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                    <div class={connector2Class}></div>
                </div>

                <!-- 3. Plan Card -->
                <div class="workflow-step">
                    <div class={planCardClass} onclick={handlePlanClick}>
                        <div class="card-header">
                            <div class="card-icon plan-icon">
                                <lightning-icon icon-name="utility:edit" size="small"></lightning-icon>
                            </div>
                            <div class={planStepBadgeClass}>3</div>
                        </div>
                        <div class="card-title">Plan</div>
                        
                        <template lwc:if={hasPlan}>
                            <div class="card-name">{displayPlanName}</div>
                            <div class="card-status">
                                <span class={planStatusClass}>{displayPlanStatus}</span>
                            </div>
                            <div class="card-stats">
                                <span class="stat">{displayPlanItemCount} items</span>
                            </div>
                        </template>
                        <template lwc:else>
                            <div class="card-empty">No plan created</div>
                        </template>
                        
                        <div class="card-action">
                            <template lwc:if={showDeployButton}>
                                <lightning-button 
                                    variant="brand" 
                                    label="Deploy"
                                    icon-name="utility:upload"
                                    onclick={handleDeployClick}
                                    class="action-button">
                                </lightning-button>
                            </template>
                            <template lwc:elseif={hasPlan}>
                                <lightning-button 
                                    variant="neutral" 
                                    label="View Plan"
                                    onclick={handlePlanClick}
                                    class="action-button">
                                </lightning-button>
                            </template>
                        </div>
                    </div>
                    <div class={connector3Class}></div>
                </div>

                <!-- 4. Deploy Card -->
                <div class="workflow-step workflow-step-last">
                    <div class={deploymentCardClass} onclick={handleDeploymentClick}>
                        <div class="card-header">
                            <div class="card-icon deployment-icon">
                                <lightning-icon icon-name="utility:upload" size="small"></lightning-icon>
                            </div>
                            <div class={deployStepBadgeClass}>4</div>
                        </div>
                        <div class="card-title">Deploy</div>
                        
                        <template lwc:if={hasDeployment}>
                            <div class="card-status">
                                <span class={deploymentStatusClass}>{displayDeploymentStatus}</span>
                            </div>
                            <template lwc:if={hasDeploymentStats}>
                                <div class="card-stats">
                                    <span class="stat stat-success">{deploymentSuccessCount} updated</span>
                                    <template lwc:if={hasDeploymentFailures}>
                                        <span class="stat stat-error">{deploymentFailCount} failed</span>
                                    </template>
                                </div>
                            </template>
                            <template lwc:if={hasBackup}>
                                <div class="card-backup">
                                    <lightning-icon icon-name="utility:backup" size="xx-small"></lightning-icon>
                                    <span>Backup available</span>
                                </div>
                            </template>
                        </template>
                        <template lwc:else>
                            <div class="card-empty">No deployment yet</div>
                        </template>
                        
                        <div class="card-action">
                            <template lwc:if={showRestoreButton}>
                                <lightning-button 
                                    variant="neutral" 
                                    label="Restore"
                                    icon-name="utility:undo"
                                    onclick={handleRestoreClick}
                                    class="action-button">
                                </lightning-button>
                            </template>
                            <template lwc:elseif={hasDeployment}>
                                <lightning-button 
                                    variant="neutral" 
                                    label="View Details"
                                    onclick={handleDeploymentClick}
                                    class="action-button">
                                </lightning-button>
                            </template>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </lightning-card>
</template>
