<template>
    <lightning-card icon-name="custom:custom63">
        <div slot="title" class="header-title-area">
            <lightning-button 
                variant="brand"
                label="New Session"
                icon-name="utility:add"
                onclick={handleClearSession}
                class="slds-m-right_medium">
            </lightning-button>
            <lightning-badge label={orgContext.orgName} class="slds-m-right_small"></lightning-badge>
            <lightning-badge label={orgTypeLabel} class={orgTypeBadgeClass}></lightning-badge>
        </div>
        <div slot="actions">
            <lightning-button-icon 
                icon-name="utility:settings" 
                alternative-text="Settings"
                title="Settings"
                onclick={handleSettingsClick}>
            </lightning-button-icon>
            <lightning-button-icon 
                icon-name="utility:refresh" 
                alternative-text="Refresh"
                title="Refresh"
                onclick={handleRefresh}
                class="slds-m-left_x-small">
            </lightning-button-icon>
        </div>

        <template if:true={isLoading}>
            <div class="slds-is-relative slds-p-around_large">
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:false={isLoading}>
            <template if:true={error}>
                <div class="slds-p-around_medium">
                    <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                        <span class="slds-assistive-text">error</span>
                        <lightning-icon icon-name="utility:error" size="small" class="slds-m-right_x-small"></lightning-icon>
                        <h2>{error}</h2>
                    </div>
                </div>
            </template>

            <div class="slds-p-around_medium">
                <!-- Status Summary Card - 4 Step Cards with Integrated Navigation -->
                <c-status-summary-card
                    session={session}
                    current-step={workflowStep}
                    target-api-version={settings.targetApiVersion}
                    scan-name={currentScanName}
                    scan-status={currentScanStatus}
                    scan-started-at={currentScanStartedAt}
                    findings-count={findingsCount}
                    alerts-count={alertsCount}
                    components-needing-upgrade={componentsNeedingUpgrade}
                    plan-name={currentPlanName}
                    plan-status={currentPlanStatus}
                    plan-item-count={changeItemsCount}
                    deployment-status={currentDeploymentStatus}
                    has-backup={hasBackup}
                    onclearsession={handleClearSession}
                    onstartscan={handleStartScan}
                    oncancelscan={handleCancelScan}
                    onviewscan={handleScanSelect}
                    onviewfindings={handleViewFindings}
                    oncreateplan={handleCreatePlan}
                    onviewplan={handlePlanSelect}
                    ondeploynow={handleDeployNow}
                    onviewdeployment={handleViewDeployment}
                    onrestore={handleRestore}>
                </c-status-summary-card>

                <!-- Step-Based Content Views -->
                <div class="slds-m-top_small">
                    
                    <!-- Step 0: Dashboard / Initial State -->
                    <template lwc:if={showDashboardView}>
                        <div>
                            <c-inventory-panel 
                                inventory-counts={inventoryCounts}
                                version-distribution={versionDistribution}
                                compliance-metrics={complianceMetrics}
                                target-version={settings.targetApiVersion}
                                scope-policy={settings.scopePolicy}
                                onrefresh={handleInventoryRefresh}
                                onstartscan={handleStartScan}
                                ontypechange={handleTypeChange}>
                            </c-inventory-panel>

                            <!-- Recent Sessions -->
                            <div class="slds-m-top_medium">
                                <lightning-card title="Recent Sessions" icon-name="utility:clock">
                                    <lightning-button 
                                        slot="actions"
                                        label="Refresh"
                                        icon-name="utility:refresh"
                                        onclick={handleRefreshScanHistory}>
                                    </lightning-button>
                                    <div class="slds-p-around_medium">
                                        <template lwc:if={hasRecentScans}>
                                            <lightning-datatable
                                                key-field="scanId"
                                                data={recentScansData}
                                                columns={scanHistoryColumns}
                                                hide-checkbox-column
                                                onrowaction={handleScanHistoryAction}>
                                            </lightning-datatable>
                                        </template>
                                        <template lwc:else>
                                            <div class="slds-text-align_center slds-text-color_weak slds-p-around_medium">
                                                <lightning-icon icon-name="utility:info" size="medium" class="slds-m-bottom_small"></lightning-icon>
                                                <p>No previous sessions. Start a compliance scan to begin.</p>
                                            </div>
                                        </template>
                                    </div>
                                </lightning-card>
                            </div>
                        </div>
                    </template>

                    <!-- Step 1: Scanning in Progress -->
                    <template lwc:if={showScanningView}>
                        <div class="slds-p-around_small">
                            <lightning-card title="Scan in Progress" icon-name="utility:search">
                                <div class="slds-p-around_medium">
                                    <div class="slds-grid slds-gutters">
                                        <div class="slds-col slds-size_1-of-5">
                                            <div class="slds-text-title_caps slds-m-bottom_xx-small">Status</div>
                                            <lightning-badge label={currentScanStatus} class={scanStatusBadgeClass}></lightning-badge>
                                        </div>
                                        <div class="slds-col slds-size_1-of-5">
                                            <div class="slds-text-title_caps slds-m-bottom_xx-small">Started</div>
                                            <template lwc:if={currentScanStartedAt}>
                                                <lightning-formatted-date-time 
                                                    value={currentScanStartedAt}
                                                    year="numeric" month="short" day="2-digit"
                                                    hour="2-digit" minute="2-digit">
                                                </lightning-formatted-date-time>
                                            </template>
                                            <template lwc:else>-</template>
                                        </div>
                                        <div class="slds-col slds-size_1-of-5">
                                            <div class="slds-text-title_caps slds-m-bottom_xx-small">Findings</div>
                                            <span>{findingsCount}</span>
                                        </div>
                                        <div class="slds-col slds-size_1-of-5">
                                            <div class="slds-text-title_caps slds-m-bottom_xx-small">Alerts</div>
                                            <span class="slds-text-color_error">{alertsCount}</span>
                                        </div>
                                        <div class="slds-col slds-size_1-of-5">
                                            <div class="slds-text-title_caps slds-m-bottom_xx-small">Target API</div>
                                            <span>v{settings.targetApiVersion}</span>
                                        </div>
                                    </div>
                                    
                                    <template lwc:if={isScanRunning}>
                                        <div class="slds-m-top_medium">
                                            <lightning-progress-bar value="50" size="small"></lightning-progress-bar>
                                            <div class="slds-text-align_center slds-m-top_x-small slds-text-color_weak">
                                                Processing...
                                            </div>
                                        </div>
                                        <div class="slds-m-top_medium slds-text-align_center">
                                            <lightning-button 
                                                variant="destructive" 
                                                label="Cancel Scan" 
                                                onclick={handleCancelScan}>
                                            </lightning-button>
                                        </div>
                                    </template>
                                </div>
                            </lightning-card>
                        </div>
                    </template>

                    <!-- Step 2: Review Findings -->
                    <template lwc:if={showReviewView}>
                        <div class="slds-p-around_small">
                            <template lwc:if={hasScanResults}>
                                <c-findings-panel
                                    scan-id={selectedScanId}
                                    findings={findings}
                                    findings-summary={findingsSummary}
                                    target-version={settings.targetApiVersion}
                                    scope-policy={settings.scopePolicy}
                                    scan-alerts-count={alertsCount}
                                    oncreateplan={handleCreatePlan}
                                    onshowerror={handleShowError}>
                                </c-findings-panel>
                            </template>
                            <template lwc:else>
                                <lightning-card title="Review Findings" icon-name="utility:search">
                                    <div class="slds-p-around_large slds-text-align_center">
                                        <lightning-icon icon-name="utility:info" size="large" class="slds-m-bottom_small"></lightning-icon>
                                        <h3 class="slds-text-heading_medium">No Findings to Review</h3>
                                        <p class="slds-text-body_regular slds-text-color_weak slds-m-top_small">
                                            Complete a scan to view findings and create a change plan.
                                        </p>
                                    </div>
                                </lightning-card>
                            </template>
                        </div>
                    </template>

                    <!-- Step 3: Change Plan -->
                    <template lwc:if={showPlanView}>
                        <div class="slds-p-around_small">
                            <template lwc:if={hasChangePlan}>
                                <c-change-plan-panel
                                    change-plan={changePlan}
                                    change-items={changeItems}
                                    deployment-run-id={currentDeploymentRunId}
                                    onexecuteplan={handleExecutePlan}
                                    onplanreset={handlePlanReset}
                                    onquickfix={handleQuickFix}>
                                </c-change-plan-panel>
                            </template>
                            <template lwc:else>
                                <lightning-card title="Change Plan" icon-name="utility:checkin">
                                    <div class="slds-p-around_large slds-text-align_center">
                                        <lightning-icon icon-name="utility:info" size="large" class="slds-m-bottom_small"></lightning-icon>
                                        <h3 class="slds-text-heading_medium">No Change Plan</h3>
                                        <p class="slds-text-body_regular slds-text-color_weak slds-m-top_small">
                                            Create a change plan from the Review step after completing a scan.
                                        </p>
                                    </div>
                                </lightning-card>
                            </template>
                        </div>
                    </template>

                    <!-- Step 4: Deployment & Backup -->
                    <template lwc:if={showDeployView}>
                        <div class="slds-p-around_small">
                            <c-backup-restore-panel
                                deployment-run-id={currentDeploymentRunId}
                                plan-id={currentPlanId}
                                has-backup={hasBackup}
                                onbackupcleanedup={handleBackupCleanedUp}>
                            </c-backup-restore-panel>
                        </div>
                    </template>

                    <!-- Settings Modal -->
                    <template lwc:if={showSettingsModal}>
                        <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="settings-heading" class="slds-modal slds-fade-in-open slds-modal_medium">
                            <div class="slds-modal__container">
                                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" onclick={handleCloseSettings}>
                                    <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                                    <span class="slds-assistive-text">Close</span>
                                </button>
                                <div class="slds-modal__header">
                                    <h1 id="settings-heading" class="slds-text-heading_medium">Settings</h1>
                                </div>
                                <div class="slds-modal__content slds-p-around_medium">
                                    <div class="slds-grid slds-gutters">
                                        <div class="slds-col slds-size_1-of-2">
                                            <lightning-card title="Scan Settings">
                                                <div class="slds-p-horizontal_medium">
                                                    <lightning-combobox
                                                        name="targetApiVersion"
                                                        label="Target API Version"
                                                        value={settings.targetApiVersion}
                                                        options={apiVersionOptions}
                                                        onchange={handleSettingChange}>
                                                    </lightning-combobox>

                                                    <lightning-dual-listbox
                                                        name="includedTypes"
                                                        label="Component Types"
                                                        source-label="Available"
                                                        selected-label="Selected"
                                                        options={componentTypeOptions}
                                                        value={settings.includedTypes}
                                                        onchange={handleSettingChange}
                                                        class="slds-m-top_medium">
                                                    </lightning-dual-listbox>

                                                    <lightning-combobox
                                                        name="scopePolicy"
                                                        label="Scope Policy"
                                                        value={settings.scopePolicy}
                                                        options={scopePolicyOptions}
                                                        onchange={handleSettingChange}
                                                        class="slds-m-top_medium">
                                                    </lightning-combobox>
                                                </div>
                                            </lightning-card>
                                        </div>

                                        <div class="slds-col slds-size_1-of-2">
                                            <lightning-card title="Deployment Settings">
                                                <div class="slds-p-horizontal_medium">
                                                    <lightning-combobox
                                                        name="incrementPolicy"
                                                        label="Increment Policy"
                                                        value={settings.incrementPolicy}
                                                        options={incrementPolicyOptions}
                                                        onchange={handleSettingChange}>
                                                    </lightning-combobox>

                                                    <lightning-input
                                                        type="number"
                                                        name="maxDeltaPerDeploy"
                                                        label="Max Version Delta per Deploy"
                                                        value={settings.maxDeltaPerDeploy}
                                                        min="1"
                                                        max="20"
                                                        onchange={handleSettingChange}
                                                        class="slds-m-top_medium">
                                                    </lightning-input>

                                                    <lightning-checkbox-group
                                                        name="deployOptions"
                                                        label="Deploy Options"
                                                        options={deployOptionsList}
                                                        value={selectedDeployOptions}
                                                        onchange={handleDeployOptionsChange}
                                                        class="slds-m-top_medium">
                                                    </lightning-checkbox-group>
                                                </div>
                                            </lightning-card>
                                        </div>
                                    </div>
                                </div>
                                <div class="slds-modal__footer">
                                    <lightning-button 
                                        variant="neutral" 
                                        label="Cancel"
                                        onclick={handleCloseSettings}
                                        class="slds-m-right_small">
                                    </lightning-button>
                                    <lightning-button 
                                        variant="brand" 
                                        label="Save Settings"
                                        onclick={handleSaveSettingsAndClose}>
                                    </lightning-button>
                                </div>
                            </div>
                        </section>
                        <div class="slds-backdrop slds-backdrop_open" onclick={handleCloseSettings}></div>
                    </template>

                </div>
            </div>
        </template>
    </lightning-card>
</template>
