<template>
    <div class="slds-grid slds-gutters slds-wrap">
        <!-- Plan Summary -->
        <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
            <lightning-card title="Change Plan Summary">
                <div slot="actions">
                    <span class={planStatusClass}>{changePlan.status}</span>
                </div>
                <div class="slds-p-horizontal_medium slds-p-vertical_small">
                    <div class="slds-grid slds-gutters slds-wrap">
                        <div class="slds-col slds-size_1-of-6">
                            <div class="slds-box stat-box">
                                <div class="stat-value">{changePlan.totalItems}</div>
                                <div class="stat-label">Total Items</div>
                            </div>
                        </div>
                        <div class="slds-col slds-size_1-of-6">
                            <div class="slds-box stat-box stat-eligible">
                                <div class="stat-value">{changePlan.eligibleItems}</div>
                                <div class="stat-label">Eligible</div>
                            </div>
                        </div>
                        <div class="slds-col slds-size_1-of-6">
                            <div class="slds-box stat-box stat-blocked">
                                <div class="stat-value">{changePlan.blockedItems}</div>
                                <div class="stat-label">Blocked</div>
                            </div>
                        </div>
                        <div class="slds-col slds-size_1-of-6">
                            <div class="slds-box stat-box">
                                <div class="stat-value">{changePlan.targetApiVersion}</div>
                                <div class="stat-label">Target Version</div>
                            </div>
                        </div>
                        <div class="slds-col slds-size_1-of-6">
                            <div class="slds-box stat-box stat-validated">
                                <div class="stat-value">{validatedCount}</div>
                                <div class="stat-label">Validated</div>
                            </div>
                        </div>
                        <template lwc:if={hasFailedItemsCount}>
                            <div class="slds-col slds-size_1-of-6">
                                <div class="slds-box stat-box stat-failed-box clickable" onclick={handleShowFailed}>
                                    <div class="stat-value stat-failed-value">{failedItemsCount}</div>
                                    <div class="stat-label">Failed</div>
                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- Validation Flow Actions -->
                    <div class="slds-m-top_small">
                        <div class="slds-grid slds-grid_align-center slds-gutters">
                            <!-- Step 1: Validate -->
                            <div class="slds-col">
                                <div class="action-step">
                                    <div class="step-number">1</div>
                                    <div class="step-content">
                                        <h3 class="slds-text-heading_small">Validate</h3>
                                        <p class="slds-text-body_small slds-text-color_weak">
                                            Check selected components compile successfully
                                        </p>
                                        <lightning-button 
                                            variant="brand" 
                                            label={validateButtonLabel}
                                            icon-name="utility:check"
                                            onclick={handleValidate}
                                            disabled={cannotValidate}
                                            class="slds-m-top_small">
                                        </lightning-button>
                                    </div>
                                </div>
                            </div>

                            <!-- Arrow -->
                            <div class="slds-col slds-grow-none step-arrow">
                                <lightning-icon icon-name="utility:forward" size="small"></lightning-icon>
                            </div>

                            <!-- Step 2: Deploy -->
                            <div class="slds-col">
                                <div class="action-step">
                                    <div class="step-number">2</div>
                                    <div class="step-content">
                                        <h3 class="slds-text-heading_small">Deploy</h3>
                                        <p class="slds-text-body_small slds-text-color_weak">
                                            Apply API version changes to your org
                                        </p>
                                        <lightning-button 
                                            variant="success" 
                                            label={deployButtonLabel}
                                            icon-name="utility:upload"
                                            onclick={handleDeployClick}
                                            disabled={cannotDeploy}
                                            title={deployButtonTitle}
                                            class="slds-m-top_small">
                                        </lightning-button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Failure Error Panel -->
                        <template lwc:if={hasDeploymentFailed}>
                            <div class="error-panel slds-m-top_medium">
                                <div class="error-panel-header">
                                    <lightning-icon icon-name="utility:error" size="small" variant="error"></lightning-icon>
                                    <h3 class="slds-text-heading_small">{failureTypeLabel}</h3>
                                </div>
                                
                                <div class="error-panel-body">
                                    <p class="error-summary">{deploymentErrorMessage}</p>
                                    
                                    <!-- Failed Items List -->
                                    <template lwc:if={hasFailedItemsCount}>
                                        <div class="failed-items-section slds-m-top_small">
                                            <button class="slds-button slds-button_neutral failed-items-toggle" onclick={handleToggleFailedDetails}>
                                                <lightning-icon icon-name={failedDetailsIcon} size="xx-small" class="slds-m-right_x-small"></lightning-icon>
                                                View {failedItemsCount} Failed Item(s)
                                            </button>
                                            
                                            <template lwc:if={showFailedDetails}>
                                                <div class="failed-items-list slds-m-top_small">
                                                    <template for:each={failedItemsWithErrors} for:item="item">
                                                        <div key={item.id} class="failed-item">
                                                            <div class="failed-item-header">
                                                                <lightning-icon icon-name="utility:error" size="xx-small" variant="error"></lightning-icon>
                                                                <span class="failed-item-name">{item.fullName}</span>
                                                                <span class="failed-item-type">{item.artifactType}</span>
                                                            </div>
                                                            <template lwc:if={item.errorDetails}>
                                                                <div class="failed-item-error">{item.errorDetails}</div>
                                                            </template>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    
                                    <!-- Smart Error Guidance -->
                                    <template lwc:if={hasKnownErrorPattern}>
                                        <div class="smart-guidance slds-m-top_medium">
                                            <div class="smart-guidance-header">
                                                <lightning-icon icon-name="utility:light_bulb" size="x-small"></lightning-icon>
                                                <h4>{errorPatternGuidance.title}</h4>
                                            </div>
                                            <p class="smart-guidance-description">{errorPatternGuidance.description}</p>
                                            
                                            <!-- Affected Components with Links -->
                                            <div class="affected-components slds-m-top_small">
                                                <h5 class="section-label">Affected Components:</h5>
                                                <template for:each={affectedComponents} for:item="comp">
                                                    <div key={comp.id} class="affected-component-item">
                                                        <lightning-icon icon-name="utility:apex" size="xx-small" class="component-icon"></lightning-icon>
                                                        <span class="component-name">{comp.name}</span>
                                                        <span class="component-type">({comp.type})</span>
                                                        <lightning-button
                                                            variant="base"
                                                            label="Open in Setup"
                                                            icon-name="utility:new_window"
                                                            icon-position="right"
                                                            data-url={comp.setupUrl}
                                                            onclick={handleOpenComponent}
                                                            class="open-component-btn">
                                                        </lightning-button>
                                                    </div>
                                                </template>
                                            </div>
                                            
                                            <!-- Step-by-Step Instructions -->
                                            <div class="fix-steps slds-m-top_small">
                                                <h5 class="section-label">How to Fix:</h5>
                                                <ol class="steps-list">
                                                    <template for:each={errorPatternGuidance.steps} for:item="step">
                                                        <li key={step}>{step}</li>
                                                    </template>
                                                </ol>
                                            </div>
                                            
                                            <!-- Code Fix Options -->
                                            <template lwc:if={errorPatternGuidance.fixOptions.length}>
                                                <div class="fix-options slds-m-top_small">
                                                    <h5 class="section-label">Code Fix Options:</h5>
                                                    <template for:each={errorPatternGuidance.fixOptions} for:item="option">
                                                        <div key={option.key} class="fix-option-card">
                                                            <div class="fix-option-header">
                                                                <lightning-icon icon-name="utility:toggle_panel_right" size="xx-small"></lightning-icon>
                                                                <strong>{option.title}</strong>
                                                                <template lwc:if={option.canAutoApply}>
                                                                    <lightning-button
                                                                        variant="brand"
                                                                        label="Apply This Fix"
                                                                        icon-name="utility:magicwand"
                                                                        data-option={option.key}
                                                                        onclick={handleSelectFixOption}
                                                                        class="apply-fix-btn">
                                                                    </lightning-button>
                                                                </template>
                                                            </div>
                                                            <p class="fix-option-description">{option.description}</p>
                                                            <div class="code-block">
                                                                <pre><code>{option.code}</code></pre>
                                                            </div>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                            
                                            <!-- Quick Fix Option -->
                                            <template lwc:if={showQuickFixOption}>
                                                <div class="quick-fix-box slds-m-top_medium">
                                                    <div class="quick-fix-content">
                                                        <lightning-icon icon-name="utility:sparkles" size="x-small" class="quick-fix-icon"></lightning-icon>
                                                        <div>
                                                            <strong>Quick Fix Available:</strong> {errorPatternGuidance.quickFix}
                                                            <p class="quick-fix-note">Note: This deploys without running tests. The underlying code issue will still need to be fixed for full test coverage.</p>
                                                        </div>
                                                    </div>
                                                    <lightning-button
                                                        variant="success"
                                                        label="Deploy Without Tests"
                                                        icon-name="utility:upload"
                                                        onclick={handleQuickFix}
                                                        class="slds-m-top_small">
                                                    </lightning-button>
                                                </div>
                                            </template>

                                            <!-- Manual Deploy Option (for timeout errors) -->
                                            <template lwc:if={showManualDeployOption}>
                                                <div class="manual-deploy-box slds-m-top_medium">
                                                    <div class="manual-deploy-content">
                                                        <lightning-icon icon-name="utility:touch_action" size="x-small" class="manual-deploy-icon"></lightning-icon>
                                                        <div>
                                                            <strong>Manual Deployment Required</strong>
                                                            <p class="manual-deploy-note">The automated deployment timed out. Please manually update each component's API version in Salesforce Setup using the links above, then click "Mark as Deployed" to update the status.</p>
                                                        </div>
                                                    </div>
                                                    <lightning-button
                                                        variant="success"
                                                        label="Mark as Deployed"
                                                        icon-name="utility:check"
                                                        onclick={handleMarkAsDeployed}
                                                        class="slds-m-top_small">
                                                    </lightning-button>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    
                                    <!-- Generic Remediation Guidance -->
                                    <template lwc:else>
                                        <div class="remediation-section slds-m-top_medium">
                                            <h4 class="slds-text-title_caps slds-m-bottom_x-small">How to Fix</h4>
                                            <ol class="remediation-steps">
                                                <li>Review the error details above for each failed component</li>
                                                <li>Fix the issues in the source code (common issues: missing dependencies, syntax errors, test failures)</li>
                                                <li>Click "Retry Validation" to re-validate the components</li>
                                            </ol>
                                        </div>
                                    </template>
                                    
                                    <!-- Action Buttons -->
                                    <div class="error-actions slds-m-top_medium">
                                        <lightning-button 
                                            variant="brand"
                                            label="Retry Validation"
                                            icon-name="utility:refresh"
                                            onclick={handleRetryValidation}
                                            class="slds-m-right_small">
                                        </lightning-button>
                                        <template lwc:if={hasFailedItemsCount}>
                                            <lightning-button 
                                                variant="neutral"
                                                label="Exclude Failed & Continue"
                                                icon-name="utility:forward"
                                                onclick={handleExcludeFailed}
                                                class="slds-m-right_small">
                                            </lightning-button>
                                        </template>
                                        <template lwc:if={hasUncommittedWorkError}>
                                            <lightning-button 
                                                variant="brand-outline"
                                                label="Cleanup Stuck Containers"
                                                icon-name="utility:delete"
                                                onclick={handleCleanupContainers}
                                                class="slds-m-right_small">
                                            </lightning-button>
                                        </template>
                                        <template lwc:if={canResetPlan}>
                                            <lightning-button 
                                                variant="destructive-text"
                                                label="Reset Plan"
                                                icon-name="utility:undo"
                                                onclick={handleResetPlan}>
                                            </lightning-button>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </template>

                        <!-- Validation Status Message -->
                        <template lwc:if={validationComplete}>
                            <div class="slds-notify slds-notify_alert slds-alert_success slds-m-top_medium" role="alert">
                                <lightning-icon icon-name="utility:success" size="small" variant="inverse" class="slds-m-right_x-small"></lightning-icon>
                                <span>
                                    Validation complete! <strong>{validatedCount} components</strong> passed validation and are ready to deploy.
                                </span>
                            </div>
                        </template>

                        <template lwc:if={isValidating}>
                            <div class="slds-m-top_medium slds-text-align_center">
                                <lightning-spinner alternative-text="Validating" size="small"></lightning-spinner>
                                <p class="slds-m-top_small slds-text-color_weak">Validating selected components...</p>
                            </div>
                        </template>

                        <template lwc:if={isDeploying}>
                            <div class="slds-m-top_medium slds-text-align_center">
                                <lightning-spinner alternative-text="Deploying" size="small"></lightning-spinner>
                                <p class="slds-m-top_small slds-text-color_weak">Deploying changes to org...</p>
                            </div>
                        </template>
                    </div>
                </div>
            </lightning-card>
        </div>

        <!-- Change Items Table -->
        <div class="slds-col slds-size_1-of-1">
            <lightning-card title="Change Items">
                <div slot="actions">
                    <div class="slds-grid slds-gutters slds-grid_vertical-align-center">
                        <div class="slds-col">
                            <lightning-button-group>
                                <lightning-button 
                                    label="Select All Eligible"
                                    onclick={handleSelectAll}
                                    icon-name="utility:multi_select_checkbox">
                                </lightning-button>
                                <lightning-button 
                                    label="Clear Selection"
                                    onclick={handleSelectNone}
                                    icon-name="utility:clear">
                                </lightning-button>
                            </lightning-button-group>
                        </div>
                        <div class="slds-col">
                            <lightning-badge label={selectionBadgeLabel} class="selection-badge"></lightning-badge>
                        </div>
                        <div class="slds-col">
                            <lightning-combobox
                                name="eligibilityFilter"
                                value={eligibilityFilter}
                                options={eligibilityOptions}
                                onchange={handleFilterChange}
                                variant="label-hidden">
                            </lightning-combobox>
                        </div>
                    </div>
                </div>

                <template lwc:if={hasChangeItems}>
                    <lightning-datatable
                        key-field="id"
                        data={filteredChangeItems}
                        columns={columns}
                        selected-rows={preSelectedRows}
                        onrowselection={handleRowSelection}
                        sorted-by={sortedBy}
                        sorted-direction={sortedDirection}
                        onsort={handleSort}
                        max-row-selection={eligibleCount}>
                    </lightning-datatable>
                </template>

                <template lwc:else>
                    <div class="slds-p-around_large slds-text-align_center slds-text-color_weak">
                        No change items in this plan
                    </div>
                </template>
            </lightning-card>
        </div>

        <!-- Execution Results -->
        <template lwc:if={hasExecutionResults}>
            <div class="slds-col slds-size_1-of-1 slds-m-top_medium">
                <lightning-card title="Execution Results">
                    <div class="slds-p-around_medium">
                        <div class="slds-grid slds-gutters">
                            <div class="slds-col slds-size_1-of-3">
                                <div class="slds-box result-box result-success">
                                    <lightning-icon icon-name="utility:success" size="small" class="slds-m-right_x-small"></lightning-icon>
                                    <span class="result-value">{successCount}</span>
                                    <span class="result-label">Succeeded</span>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-3">
                                <div class="slds-box result-box result-failed">
                                    <lightning-icon icon-name="utility:error" size="small" class="slds-m-right_x-small"></lightning-icon>
                                    <span class="result-value">{failedCount}</span>
                                    <span class="result-label">Failed</span>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-3">
                                <div class="slds-box result-box result-skipped">
                                    <lightning-icon icon-name="utility:dash" size="small" class="slds-m-right_x-small"></lightning-icon>
                                    <span class="result-value">{skippedCount}</span>
                                    <span class="result-label">Skipped</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </lightning-card>
            </div>
        </template>
    </div>

    <!-- Deploy Confirmation Modal -->
    <template lwc:if={showDeployConfirmation}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" onclick={handleCancelDeploy}>
                        <lightning-icon icon-name="utility:close" alternative-text="Close" size="small"></lightning-icon>
                    </button>
                    <h2 class="slds-modal__title slds-hyphenate">Confirm Deployment</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <div class="slds-m-bottom_medium">
                        <p class="slds-text-body_regular">
                            You are about to deploy <strong>{validatedCount} components</strong> with updated API versions.
                        </p>
                    </div>

                    <!-- Backup Option -->
                    <div class="slds-box slds-theme_shade slds-m-bottom_medium">
                        <div class="slds-grid slds-gutters slds-grid_vertical-align-center">
                            <div class="slds-col slds-grow-none">
                                <lightning-icon icon-name="utility:backup" size="medium" class="backup-icon"></lightning-icon>
                            </div>
                            <div class="slds-col">
                                <h3 class="slds-text-heading_small">Backup & Restore</h3>
                                <p class="slds-text-body_small slds-text-color_weak">
                                    Create a backup of each component before upgrading, allowing you to restore original versions if needed.
                                </p>
                            </div>
                            <div class="slds-col slds-grow-none">
                                <lightning-input 
                                    type="toggle"
                                    label="Create Backup"
                                    checked={createBackupBeforeDeploy}
                                    onchange={handleBackupToggle}
                                    message-toggle-active="Enabled"
                                    message-toggle-inactive="Disabled">
                                </lightning-input>
                            </div>
                        </div>
                    </div>

                    <template lwc:if={createBackupBeforeDeploy}>
                        <div class="slds-notify slds-notify_alert slds-alert_info" role="alert">
                            <lightning-icon icon-name="utility:info" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                            <span class="slds-text-body_small">
                                Backups will be stored for 90 days. You can restore components from the <strong>Backup & Restore</strong> tab after deployment.
                            </span>
                        </div>
                    </template>

                    <template lwc:else>
                        <div class="slds-notify slds-notify_alert slds-alert_warning" role="alert">
                            <lightning-icon icon-name="utility:warning" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                            <span class="slds-text-body_small">
                                <strong>Warning:</strong> Without backup, you cannot automatically restore components to their original API versions.
                            </span>
                        </div>
                    </template>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button 
                        variant="neutral" 
                        label="Cancel" 
                        onclick={handleCancelDeploy}>
                    </lightning-button>
                    <lightning-button 
                        variant="brand" 
                        label="Deploy Now" 
                        onclick={handleConfirmDeploy}
                        class="slds-m-left_x-small">
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Refactor Preview Modal -->
    <template lwc:if={showRefactorModal}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon 
                        icon-name="utility:close" 
                        alternative-text="Close" 
                        onclick={handleCloseRefactorModal}
                        class="slds-modal__close">
                    </lightning-button-icon>
                    <h2 class="slds-modal__title slds-hyphenate">
                        <lightning-icon icon-name="utility:magicwand" size="small" class="slds-m-right_x-small"></lightning-icon>
                        Apply Code Fix: {fixOptionLabel}
                    </h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <template lwc:if={isLoadingPreview}>
                        <div class="slds-align_absolute-center slds-p-around_large">
                            <lightning-spinner alternative-text="Analyzing code..." size="medium"></lightning-spinner>
                            <p class="slds-m-left_medium">Analyzing code and generating preview...</p>
                        </div>
                    </template>
                    
                    <template lwc:if={hasRefactorPreview}>
                        <div class="refactor-preview">
                            <div class="preview-header slds-m-bottom_medium">
                                <lightning-icon icon-name="utility:apex" size="small"></lightning-icon>
                                <span class="slds-m-left_x-small"><strong>Component:</strong> {selectedComponentForFix}</span>
                            </div>
                            
                            <div class="changes-summary slds-m-bottom_medium">
                                <h4 class="slds-text-title_caps slds-m-bottom_x-small">Changes to be made:</h4>
                                <ul class="changes-list">
                                    <template for:each={refactorPreview.changes} for:item="change">
                                        <li key={change}>
                                            <lightning-icon icon-name="utility:check" size="xx-small" class="change-icon"></lightning-icon>
                                            {change}
                                        </li>
                                    </template>
                                </ul>
                            </div>
                            
                            <div class="code-comparison">
                                <div class="code-panel">
                                    <h5 class="code-panel-title">
                                        <lightning-icon icon-name="utility:file" size="xx-small"></lightning-icon>
                                        Original Code
                                    </h5>
                                    <div class="code-block code-original">
                                        <pre><code>{refactorPreview.originalCode}</code></pre>
                                    </div>
                                </div>
                                <div class="code-panel">
                                    <h5 class="code-panel-title code-panel-title-new">
                                        <lightning-icon icon-name="utility:new" size="xx-small"></lightning-icon>
                                        Refactored Code
                                        <lightning-button
                                            variant="base"
                                            label="Copy Code"
                                            icon-name="utility:copy"
                                            onclick={handleCopyRefactoredCode}
                                            class="copy-code-btn">
                                        </lightning-button>
                                    </h5>
                                    <div class="code-block code-refactored">
                                        <pre><code>{refactorPreview.refactoredCode}</code></pre>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="preview-info slds-m-top_medium">
                                <lightning-icon icon-name="utility:info" variant="inverse" size="small"></lightning-icon>
                                <span class="slds-m-left_x-small">
                                    <strong>How to apply:</strong> 
                                    1. Click "Copy Code" to copy the refactored code 
                                    2. Click "Open Class in Setup" to open Apex Classes 
                                    3. Find <strong>{selectedComponentForFix}</strong>, click Edit 
                                    4. Select all (Ctrl+A), paste (Ctrl+V), Save
                                </span>
                            </div>
                        </div>
                    </template>
                    
                    <template lwc:if={hasRefactorError}>
                        <div class="preview-error slds-p-around_medium">
                            <lightning-icon icon-name="utility:error" variant="error" size="small"></lightning-icon>
                            <span class="slds-m-left_x-small">{refactorPreview.message}</span>
                        </div>
                    </template>
                </div>
                <footer class="slds-modal__footer slds-modal__footer_directional">
                    <lightning-button 
                        variant="neutral" 
                        label="Cancel" 
                        onclick={handleCloseRefactorModal}>
                    </lightning-button>
                    <div class="slds-button-group">
                        <lightning-button 
                            variant="neutral" 
                            label="1. Copy Code"
                            icon-name="utility:copy"
                            onclick={handleCopyRefactoredCode}
                            disabled={isLoadingPreview}>
                        </lightning-button>
                        <lightning-button 
                            variant="brand" 
                            label="2. Open Class in Setup"
                            icon-name="utility:new_window"
                            onclick={handleOpenClassInSetup}
                            disabled={isLoadingPreview}
                            class="slds-m-left_x-small">
                        </lightning-button>
                    </div>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
